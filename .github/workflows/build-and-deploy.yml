name: Build and Deploy HiSUP
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore src/HiSUP/HiSUP.csproj
      - run: dotnet build src/HiSUP/HiSUP.csproj --no-restore -c Release
      - run: dotnet publish src/HiSUP/HiSUP.csproj -c Release -o ./publish
